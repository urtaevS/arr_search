<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1622"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Magnet body -->
  <g transform="translate(256,256)">
    <!-- Magnet U shape -->
    <path d="M-80,-140 L-80,40 Q-80,120 0,120 Q80,120 80,40 L80,-140"
          fill="none" stroke="#2EA6FF" stroke-width="36" stroke-linecap="round"/>
    <!-- Magnet bottom curves -->
    <path d="M-80,40 Q-80,120 0,120 Q80,120 80,40"
          fill="none" stroke="#2EA6FF" stroke-width="36" stroke-linecap="round"/>
    <!-- Red highlights on bottom -->
    <path d="M-80,40 Q-80,100 -40,110"
          fill="none" stroke="#ff4444" stroke-width="24" stroke-linecap="round" opacity="0.9"/>
    <path d="M80,40 Q80,100 40,110"
          fill="none" stroke="#ff4444" stroke-width="24" stroke-linecap="round" opacity="0.9"/>
    <!-- Search/glow dots -->
    <circle cx="-40" cy="-190" r="12" fill="#2EA6FF" opacity="0.7"/>
    <circle cx="0" cy="-210" r="16" fill="#2EA6FF" opacity="0.9"/>
    <circle cx="40" cy="-190" r="12" fill="#2EA6FF" opacity="0.7"/>
  </g>
</svg>
